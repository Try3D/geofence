[databases]
gis = host=postgis port=5432 user=${POSTGRES_USER:-gis} password=${POSTGRES_PASSWORD:-gis} dbname=${POSTGRES_DB:-gis}

[pgbouncer]
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
max_idle_connections = 30
server_idle_timeout = 600
listen_port = 6432
listen_addr = 0.0.0.0
