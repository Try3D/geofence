services:
  postgis:
    image: imresamu/postgis:latest
    container_name: geofence-postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gis}
      POSTGRES_DB: ${POSTGRES_DB:-gis}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql
    command: >
      postgres
      -c shared_buffers=6GB
      -c effective_cache_size=18GB
      -c work_mem=64MB
      -c maintenance_work_mem=1GB
      -c max_wal_size=4GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gis} -d ${POSTGRES_DB:-gis}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: geofence-pgbouncer
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gis}
      POSTGRES_DB: ${POSTGRES_DB:-gis}
      DATABASES_HOST: postgis
      DATABASES_PORT: 5432
      DATABASES_USER: ${POSTGRES_USER:-gis}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD:-gis}
      DATABASES_DBNAME: ${POSTGRES_DB:-gis}
    ports:
      - 5433:6432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-gis}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: geofence-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgis_data:
