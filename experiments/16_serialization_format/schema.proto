syntax = "proto3";

message PointBatch {
  repeated double lons = 1;  // packed, 1000 × 8 bytes = 8000 bytes
  repeated double lats = 2;  // packed, 1000 × 8 bytes = 8000 bytes
}

message BoundaryMatch {
  int64  id          = 1;
  int64  osm_id      = 2;
  string name        = 3;
  int32  admin_level = 4;
  int32  depth       = 5;
}

message PointResult {
  int32 idx = 1;
  repeated BoundaryMatch hierarchy = 2;
}

message BatchResponse {
  int32 count = 1;
  repeated PointResult results = 2;
}
